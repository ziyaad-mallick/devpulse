<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevPulse — GitHub Activity Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app">

    <!-- Top bar -->
    <header class="topbar">
        <span class="topbar-logo">DevPulse</span>
        <div class="search-row">
            <input type="text" id="usernameInput" class="search-input"
                   placeholder="GitHub username..." autocomplete="off">
            <button id="searchBtn" class="search-btn">Search</button>
        </div>
        <p class="search-hint">Try: <span id="exampleUser">torvalds</span></p>
    </header>

    <!-- Dashboard area -->
    <main id="dashArea"></main>

</div>
<script src="app.js"></script>
</body>
</html>

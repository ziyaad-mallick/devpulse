<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevPulse — batch compare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="batch.css">
</head>
<body>
<div class="app">

    <header class="topbar">
        <div class="brand">
            <span class="brand-mark"></span>
            <span class="brand-name">devpulse</span>
        </div>
        <nav class="topnav">
            <a href="index.html">Single</a>
            <a href="batch.html" class="is-active">Batch</a>
        </nav>
    </header>

    <main class="batch-main">
        <div class="batch-input panel">
            <div class="panel-h">
                <h1 class="panel-title">Screen many developers at once</h1>
            </div>
            <p class="batch-subtext">Compare contributions, languages, and top repos across multiple GitHub users in a single sortable table.</p>
            <textarea id="usernamesInput" placeholder="Paste usernames — one per line or comma-separated&#10;e.g. torvalds, gaearon, sindresorhus"></textarea>
            <div class="batch-controls">
                <label class="file-label">
                    <input type="file" id="csvInput" accept=".csv,.txt">
                    Upload CSV
                </label>
                <input type="password" id="tokenInput" placeholder="Optional GitHub token (for large batches)">
                <button id="runBatch" class="run-btn">Compare</button>
            </div>
            <div id="progress" class="cmp-progress"></div>
        </div>

        <div id="batchResults"></div>
    </main>

</div>
<script src="batch.js"></script>
</body>
</html>
